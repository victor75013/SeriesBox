name: Build and Publish Electron App

on:
  push:
    tags:
      - 'v*' # Déclenche la compilation lors de la création d'un tag de version (ex: v1.0.0)
  workflow_dispatch: # Permet de lancer le build manuellement depuis l'onglet Actions sur GitHub

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and Publish Windows App
        run: npm run build && npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
